<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTV // HOLD ON TILL MAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            color: #ff007f;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* PARALLAX LAYER */
        .parallax-wrapper {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            z-index: -3;
            /* Using relative path - best for GitHub root folders */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                              url('ptv-wallpaper.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.2s cubic-bezier(0.2, 0.5, 0.3, 1);
        }


        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 15px solid #d4af37;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            position: relative;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.5rem;
            color: #ff007f;
            margin: 0;
            text-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
        }

        #countdown { display: flex; gap: 15px; margin-top: 20px; }

        .time-block {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff007f;
            padding: 15px;
            min-width: 90px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }

        .number { font-size: 3rem; display: block; color: #fff; line-height: 1; }
        .label { font-size: 0.8rem; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }

        .lyrics {
            margin-top: 40px;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 2px 2px #ff007f;
        }
    </style>
</head>
<body>

    <div class="parallax-wrapper" id="parallax-bg"></div>

    <div class="container">
        <h1>Hold On Till May</h1>
        
        <div id="countdown">
            <div class="time-block"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-block"><span class="number" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="time-block"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-block"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>

        <div class="lyrics">"Darling, you'll be okay."</div>
    </div>

    <script>
        // PARALLAX EFFECT
        const bg = document.getElementById('parallax-bg');
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            bg.style.transform = `translateX(${moveX}px) translateY(${moveY}px)`;
        });

        // COUNTDOWN
        const targetDate = new Date("March 15, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            document.getElementById("days").innerText = Math.max(0, Math.floor(distance / (1000 * 60 * 60 * 24)));
            document.getElementById("hours").innerText = Math.max(0, Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            document.getElementById("minutes").innerText = Math.max(0, Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
            document.getElementById("seconds").innerText = Math.max(0, Math.floor((distance % (1000 * 60)) / 1000));
        }, 1000);
    </script>
</body>
</html>

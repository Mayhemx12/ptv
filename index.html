<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLD ON TILL MAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000;
            color: #ff007f;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
        }

        /* The Background Layer */
        #parallax-bg {
            position: fixed;
            top: -5%; left: -5%; width: 110%; height: 110%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url("ptv-wallpaper.jpg");
            background-size: cover;
            background-position: center;
            z-index: -3;
            transition: transform 0.1s ease-out;
        }


        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 15px solid #d4af37;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.5rem;
            text-shadow: 3px 3px 0 #000;
            margin: 0;
            text-transform: uppercase;
        }

        #countdown { display: flex; gap: 15px; margin-top: 20px; }

        .time-block {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff007f;
            padding: 15px;
            min-width: 85px;
            text-align: center;
        }

        .number { font-size: 2.8rem; display: block; color: #fff; line-height: 1; }
        .label { font-size: 0.8rem; color: #d4af37; text-transform: uppercase; }

        .footer {
            margin-top: 40px;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>
    <div class="shatter"></div>

    <div class="container">
        <h1>Hold On Till May</h1>
        <div id="countdown">
            <div class="time-block"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-block"><span class="number" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="time-block"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-block"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
        <div class="footer">"Darling, you'll be okay."</div>
    </div>

    <script>
        // Mouse movement for parallax
        const bg = document.getElementById('parallax-bg');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Countdown Logic
        const target = new Date("March 15, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerText = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
            document.getElementById("hours").innerText = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            document.getElementById("minutes").innerText = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
            document.getElementById("seconds").innerText = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));
        }, 1000);
    </script>
</body>
</html>

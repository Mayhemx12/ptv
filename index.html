<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLD ON TILL MAY // 03.15.26</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            color: #ff007f; 
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
        }

        /* USES YOUR ROOT FOLDER IMAGE */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), 
                        url('https://ptv.mayteckcs.com/ptv-wallpaper.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -3;
        }

        /* SHATTERED GLASS EFFECT */
        .shatter-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
            background-image: 
                linear-gradient(130deg, transparent 49.8%, #fff 50%, transparent 50.2%),
                linear-gradient(210deg, transparent 49.8%, #d4af37 50%, transparent 50.2%),
                linear-gradient(30deg, transparent 49.8%, #fff 50%, transparent 50.2%),
                linear-gradient(280deg, transparent 49.8%, #d4af37 50%, transparent 50.2%);
        }

        /* THE CONTAINER FRAME */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 12px solid #d4af37; /* Gold Frame */
            box-sizing: border-box;
            backdrop-filter: blur(1px);
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.5rem;
            color: #ff007f; /* Hot Pink */
            margin: 0 0 20px 0;
            text-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }

        #countdown {
            display: flex;
            gap: 15px;
        }

        .time-block {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ff007f;
            padding: 15px;
            min-width: 90px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }

        .number {
            font-size: 3rem;
            display: block;
            color: #fff;
            line-height: 1;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #d4af37; /* Gold Label */
            letter-spacing: 2px;
        }

        .lyrics {
            margin-top: 40px;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 2px 2px #ff007f;
            transform: rotate(-2deg);
        }

    </style>
</head>
<body>

    <div class="background"></div>
    <div class="shatter-overlay"></div>

    <div class="container">
        <h1>Hold On Till May</h1>
        
        <div id="countdown">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Hrs</span>
            </div>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>

        <div class="lyrics">"Darling, you'll be okay."</div>
    </div>

    <script>
        // Target: Sunday, March 15th, 2026
        const targetDate = new Date("March 15, 2026 00:00:00").getTime();
        
        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = Math.max(0, days);
            document.getElementById("hours").innerHTML = Math.max(0, hours);
            document.getElementById("minutes").innerHTML = Math.max(0, minutes);
            document.getElementById("seconds").innerHTML = Math.max(0, seconds);

            if (distance < 0) {
                clearInterval(updateTimer);
                document.querySelector("h1").innerHTML = "IT'S MAY.";
            }
        }, 1000);
    </script>
</body>
</html>

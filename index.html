<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTV // HOLD ON TILL MAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            color: #ff007f;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
        }

        /* YOUR VERIFIED WORKING BG */
        .parallax-wrapper {
            position: fixed;
            top: -5%; left: -5%; width: 110%; height: 110%;
            z-index: -5;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                              url('ptv-wallpaper.jpg');
            background-size: cover;
            background-position: center;
        }

        /* YOUR CUSTOM TRACEMAPPED GIRL */
        #falling-girl {
            position: fixed;
            bottom: 12%; 
            right: 10%;
            width: clamp(140px, 25vw, 250px); 
            height: clamp(140px, 25vw, 250px);
            z-index: -4;
            background: url('girl.png') no-repeat center;
            background-size: contain;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.5));
            
            /* The Wind Wobble */
            animation: windWobble 4s ease-in-out infinite;
        }

        @keyframes windWobble {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 15px solid #d4af37;
            box-sizing: border-box;
            background: rgba(0,0,0,0.2);
            padding: 20px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1.8rem, 8vw, 3.5rem); /* Mobile responsive scaling */
            color: #ff007f;
            margin: 0;
            text-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            text-align: center;
        }

        #countdown { 
            display: flex; gap: 10px; margin-top: 20px; 
            flex-wrap: wrap; justify-content: center; 
        }

        .time-block {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff007f;
            padding: 10px;
            min-width: 75px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }

        .number { font-size: clamp(1.5rem, 5vw, 3rem); color: #fff; line-height: 1; display: block; }
        .label { font-size: 0.7rem; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; }

        .lyrics {
            margin-top: 30px;
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: #fff;
            text-shadow: 2px 2px #ff007f;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="parallax-wrapper" id="parallax-bg"></div>
    <div id="falling-girl"></div>

    <div class="container">
        <h1>Hold On Till May</h1>
        <div id="countdown">
            <div class="time-block"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-block"><span class="number" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="time-block"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-block"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
        <div class="lyrics">"Darling, you'll be okay."</div>
    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const girl = document.getElementById('falling-girl');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2);
            const y = (e.clientY - window.innerHeight / 2);
            
            // Subtle background movement
            bg.style.transform = `translate(${x / 60}px, ${y / 60}px)`;
            
            // Girl moves independently for depth
            girl.style.transform = `translate(${x / -25}px, ${y / -25}px)`;
        });

        // Countdown Logic
        const target = new Date("March 15, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerText = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
            document.getElementById("hours").innerText = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            document.getElementById("minutes").innerText = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
            document.getElementById("seconds").innerText = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));
        }, 1000);
    </script>
</body>
</html>

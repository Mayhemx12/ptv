<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLD ON TILL MAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            color: #ff007f;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
        }

        /* THIS IS THE VERSION THAT WORKED */
        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -5;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://ptv.mayteckcs.com/bg.jpg'); 
            background-size: cover;
            background-position: center;
        }


        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 15px solid #d4af37;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.5rem;
            color: #ff007f;
            margin: 0 0 20px 0;
            text-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }

        #countdown { display: flex; gap: 15px; }

        .time-block {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff007f;
            padding: 15px;
            min-width: 90px;
            text-align: center;
        }

        .number { font-size: 3rem; display: block; color: #fff; line-height: 1; }
        .label { font-size: 0.8rem; text-transform: uppercase; color: #d4af37; letter-spacing: 2px; }

        .footer {
            margin-top: 40px;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div id="falling-girl"></div>

    <div class="container">
        <h1>Hold On Till May</h1>
        <div id="countdown">
            <div class="time-block"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-block"><span class="number" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="time-block"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-block"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
        <div class="footer">"Darling, you'll be okay."</div>
    </div>

    <script>
        const girl = document.getElementById('falling-girl');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            girl.style.transform = `translate(${x}px, ${y}px)`;
        });

        const targetDate = new Date("March 15, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            document.getElementById("days").innerText = Math.max(0, Math.floor(distance / (1000 * 60 * 60 * 24)));
            document.getElementById("hours").innerText = Math.max(0, Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            document.getElementById("minutes").innerText = Math.max(0, Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
            document.getElementById("seconds").innerText = Math.max(0, Math.floor((distance % (1000 * 60)) / 1000));
        }, 1000);
    </script>
</body>
</html>

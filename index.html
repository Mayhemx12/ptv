<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTV // HOLD ON TILL MAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000;
            color: #ff007f;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .parallax-wrapper {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            z-index: -5;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                              url('ptv-wallpaper.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.2s cubic-bezier(0.2, 0.5, 0.3, 1);
        }

        /* EMBEDDED SILHOUETTE - No PNG file required! */
        #falling-girl {
            position: fixed;
            bottom: 15%; 
            right: 10%;
            width: 180px; 
            height: 180px;
            z-index: -4;
            background: url('girl.png') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 10px #ff007f);
            pointer-events: none;
            /* This connects to the wobble math below */
            animation: windWobble 4s ease-in-out infinite;
        }

@keyframes windWobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: translateY(-15px) rotate(3deg); }
}


        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 15px solid #d4af37;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            position: relative;
            padding: 20px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            color: #ff007f;
            margin: 0;
            text-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            text-align: center;
        }

        #countdown { 
            display: flex; 
            gap: 10px; 
            margin-top: 20px;
            flex-wrap: wrap; 
            justify-content: center;
        }

        .time-block {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff007f;
            padding: 10px;
            min-width: 75px;
            text-align: center;
        }

        .number { font-size: clamp(1.5rem, 5vw, 3rem); display: block; color: #fff; line-height: 1; }
        .label { font-size: 0.7rem; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; }

        .lyrics {
            margin-top: 30px;
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: #fff;
            text-shadow: 2px 2px #ff007f;
            text-align: center;
        }

        @media (max-width: 600px) {
            #falling-girl { width: 100px; height: 100px; bottom: 5%; right: 5%; }
        }

        /* Screen Shake Effect */
        .shake-impact {
            animation: impact 0.4s ease-out;
        }

        @keyframes impact {
            0% { transform: translate(0,0); filter: brightness(2); }
            10% { transform: translate(-10px, 5px) rotate(-1deg); }
            30% { transform: translate(10px, -5px) rotate(1deg); }
            50% { transform: translate(-5px, 2px); }
            100% { transform: translate(0,0); filter: brightness(1); }
        }

	/* TICKET STYLES */
.ticket {
    position: relative;
    background: #1a1a1a;
    width: 90%;
    max-width: 600px;
    border-left: 8px solid #9b0000;
    display: flex;
    flex-direction: row;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    overflow: hidden;
    margin: auto;
}

.ticket::before, .ticket::after {
    content: ''; position: absolute; left: 70%; width: 20px; height: 20px;
    background: #000; border-radius: 50%; z-index: 5;
}
.ticket::before { top: -10px; margin-left: -10px; }
.ticket::after { bottom: -10px; margin-left: -10px; }

.shimmer-layer {
    position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.1) 45%, rgba(212,175,55,0.3) 50%, rgba(255,255,255,0.1) 55%, transparent 70%);
    animation: glint 4s infinite linear; pointer-events: none;
}

@keyframes glint { 0% { left: -150%; } 100% { left: 150%; } }

.ticket-main { flex: 7; padding: 25px; border-right: 2px dashed rgba(255,255,255,0.2); }
.headline-ticket { font-family: 'Permanent Marker', cursive; font-size: 2.2rem; color: #9b0000; margin: 0; }
.tour-name { font-size: 1.1rem; color: #d4af37; margin-bottom: 20px; text-transform: uppercase; }
.info-item b { display: block; color: #fff; font-size: 1.2rem; }

.ticket-stub { flex: 3; padding: 25px; background: rgba(255,255,255,0.03); display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
.selah-tag { font-family: 'Permanent Marker', cursive; color: #d4af37; font-size: 0.9rem; transform: rotate(-5deg); border: 1px solid #d4af37; padding: 5px; }
.barcode { width: 100%; height: 50px; background: linear-gradient(to right, #fff 2%, #000 2%, #000 4%, #fff 4%, #fff 7%, #000 7%, #000 12%, #fff 12%, #fff 13%, #000 13%, #000 16%, #fff 16%, #fff 20%, #000 20%, #000 21%, #fff 21%, #fff 25%, #000 25%, #000 30%, #fff 30%, #fff 32%, #000 32%, #000 35%, #fff 35%); background-size: 50px 100%; margin: 15px 0; }
.serial { font-size: 0.7rem; font-family: monospace; color: #888; }

@media (max-width: 500px) {
    .ticket { flex-direction: column; max-width: 320px; border-left: none; border-top: 8px solid #9b0000; }
    .ticket-main { border-right: none; border-bottom: 2px dashed rgba(255,255,255,0.2); }
    .ticket::before, .ticket::after { left: -10px; top: 70%; }
    .ticket::after { left: auto; right: -10px; }
}
        
    </style>
</head>
<body>

    <div class="parallax-wrapper" id="parallax-bg"></div>
    <div id="falling-girl"></div>

    <div class="container">
        <h1>Hold On Till May</h1>
        <div id="countdown">
            <div class="time-block"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-block"><span class="number" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="time-block"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-block"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>

        <div class="ticket" id="ticket" style="display: none;">
    <div class="shimmer-layer"></div>
    <div class="ticket-main">
        <h1 class="headline-ticket">PIERCE THE VEIL</h1>
        <div class="tour-name">I Can't Hear You World Tour Finale</div>
        <div class="info-grid">
            <div class="info-item">DATE <b>SEP 12, 2026</b></div>
            <div class="info-item">TIME <b>06:30 PM</b></div>
            <div class="info-item">LOCATION <b>Petco Park - San Diego, CA</b></div>
        </div>
    </div>
    <div class="ticket-stub">
        <div class="selah-tag">SELAH'S TICKET</div>
        <div class="barcode"></div>
        <div class="serial">PTV-SD-091226-SEL</div>
    </div>
</div>

        <div class="lyrics">"Darling, you'll be okay."</div>
    </div>

    <script>
        const bg = document.getElementById('parallax-bg');
        const girl = document.getElementById('falling-girl');

        document.addEventListener('mousemove', (e) => {
    const moveX = (e.clientX - window.innerWidth / 2);
    const moveY = (e.clientY - window.innerHeight / 2);
    
    // Background movement
    bg.style.transform = `translateX(${moveX / 50}px) translateY(${moveY / 50}px)`;
    
    // Girl movement (Margin used so it doesn't override the 'transform' animation)
    girl.style.marginRight = (moveX / -15) + 'px';
    girl.style.marginBottom = (moveY / -15) + 'px';
});

        const targetDate = new Date("March 15, 2026 00:00:00").getTime();
const container = document.querySelector('.container');

setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

 // THE SWAP LOGIC
if (distance <= 0) {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ticket').style.display = 'flex'; // Show Ticket
    return; // Stop the rest of the timer code from running
}

    const s = Math.max(0, Math.floor((distance % (1000 * 60)) / 1000));
    
    // Trigger shake when seconds hit zero
    if (s === 0) {
        container.classList.add('shake-impact');
        setTimeout(() => container.classList.remove('shake-impact'), 400);
    }

    document.getElementById("days").innerText = Math.max(0, Math.floor(distance / (1000 * 60 * 60 * 24)));
    document.getElementById("hours").innerText = Math.max(0, Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
    document.getElementById("minutes").innerText = Math.max(0, Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
    document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
}, 1000);
    </script>
</body>
</html>
